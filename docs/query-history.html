<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Query History - TechRescue</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body class="bg-gray-100">

<header class="bg-blue-600 text-white flex justify-between items-center px-6 py-4">
<h1 class="text-xl font-semibold">TechRescue - Client Dashboard</h1>
<div class="flex items-center space-x-4">
<div class="bg-white text-blue-600 font-bold rounded-full w-8 h-8 flex items-center justify-center">JD</div>
<span>John Doe</span>
</div>
</header>

<nav class="bg-white shadow flex space-x-4 px-6 py-2 border-b text-sm font-medium">
<a href="client.html" class="text-gray-600 hover:text-blue-600 py-2">Dashboard</a>
<a href="raise-query.html" class="text-gray-600 hover:text-blue-600 py-2">Raise Query</a>
<a href="align-experts.html" class="text-gray-600 hover:text-blue-600 py-2">Align Experts</a>
<a href="field-engineers.html" class="text-gray-600 hover:text-blue-600 py-2">Field Engineers</a>
<a href="query-history.html" class="text-blue-600 border-b-2 border-blue-600 py-2">Query History</a>
</nav>

<main class="p-6 space-y-6">

<section class="bg-white rounded shadow p-4 flex justify-between items-center">
<div>
<h2 class="text-lg font-semibold mb-1">Query History</h2>
<p class="text-gray-500 text-sm">Track all your submitted tickets.</p>
</div>
<input id="searchInput" type="text" placeholder="Search queries..."
class="border border-gray-300 rounded px-3 py-2 w-64"
oninput="applySearch()"/>
</section>

<section class="bg-white rounded shadow p-4 overflow-x-auto">
<table class="min-w-full text-sm text-left">
<thead class="bg-gray-50 border-b">
<tr>
<th class="px-4 py-2">Query ID</th>
<th class="px-4 py-2">Title</th>
<th class="px-4 py-2">Category</th>
<th class="px-4 py-2">Status</th>
<th class="px-4 py-2">Created</th>
<th class="px-4 py-2">Action</th>
</tr>
</thead>
<tbody id="queryTable" class="divide-y divide-gray-100"></tbody>
</table>
</section>

</main>

<!-- MODAL -->
<div id="modal"
class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">

<div class="bg-white w-[650px] max-h-[85vh] overflow-y-auto rounded-xl shadow-2xl p-6 relative">

<button onclick="closeModal()"
class="absolute top-3 right-4 text-gray-500 hover:text-black text-xl">✖</button>

<div id="modalContent"></div>

</div>
</div>

<script>

const { jsPDF } = window.jspdf;
const token = localStorage.getItem("token");
let globalQueries = [];

/* ========================= LOAD HISTORY ========================= */
async function loadQueryHistory(){

const res = await fetch(
"https://techrescue.onrender.com/query-history",
{ headers: { "Authorization": "Bearer " + token } }
);

const queries = await res.json();
globalQueries = queries;

const table = document.getElementById("queryTable");
table.innerHTML = "";

if (!queries || queries.length === 0) {
table.innerHTML =
`<tr>
<td colspan="6" class="text-center py-4 text-gray-500">
No queries found
</td>
</tr>`;
return;
}

queries.forEach((q, index) => {

const statusColor =
q.status === "Open" ? "bg-yellow-100 text-yellow-700" :
q.status === "Resolved" ? "bg-green-100 text-green-700" :
q.status === "Closed" ? "bg-gray-100 text-gray-700" :
"bg-red-100 text-red-700";

table.innerHTML += `
<tr>
<td class="px-4 py-2">${q.ticket_number}</td>
<td class="px-4 py-2">${q.short_description}</td>
<td class="px-4 py-2">${q.category}</td>
<td class="px-4 py-2">
<span class="${statusColor} px-2 py-1 rounded text-xs">
${q.status}
</span>
</td>
<td class="px-4 py-2">
${new Date(q.created_at).toLocaleDateString()}
</td>
<td class="px-4 py-2 space-x-2">
<button onclick="openModal(${index})"
class="text-blue-600 hover:underline">
View
</button>
<button onclick="downloadPDF(${index})"
class="text-green-600 hover:underline">
PDF
</button>
</td>
</tr>
`;
});
}

/* ========================= MODAL VIEW ========================= */
function openModal(index){

const q = globalQueries[index];

document.getElementById("modalContent").innerHTML = `

<div class="border-2 border-black p-5 text-sm">

<div class="text-center font-bold text-lg underline">
Electronic Service Slip (ESS)
</div>

<div class="grid grid-cols-2 gap-4 mt-4">
<div>
<p><strong>Ticket ID:</strong> ${q.ticket_number}</p>
<p><strong>Category:</strong> ${q.category}</p>
<p><strong>Status:</strong> ${q.status}</p>
</div>

<div>
<p><strong>Created:</strong>
${new Date(q.created_at).toLocaleString()}</p>
<p><strong>Client:</strong> ${q.client_email}</p>
</div>
</div>

<hr class="my-4 border-black"/>

<div>
<strong>Description:</strong>
<div class="border p-3 mt-2 bg-gray-50">
${q.detailed_description || "No description provided"}
</div>
</div>

<hr class="my-4 border-black"/>

<div class="flex justify-between mt-6">
<div>
__________________________<br>
Authorized Signature
</div>

<div>
__________________________<br>
Client Signature
</div>
</div>

</div>
`;

document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
document.getElementById("modal").classList.add("hidden");
}

/* ========================= PROFESSIONAL PDF ========================= */
function downloadPDF(index){

const q = globalQueries[index];
const doc = new jsPDF();

doc.setLineWidth(1);
doc.rect(10, 10, 190, 277); // border

doc.setFontSize(16);
doc.setFont(undefined, "bold");
doc.text("Electronic Service Slip (ESS)", 50, 25);

doc.setFont(undefined, "normal");
doc.setFontSize(12);

doc.line(10, 35, 200, 35);

doc.text("Ticket ID: " + q.ticket_number, 20, 50);
doc.text("Category: " + q.category, 20, 60);
doc.text("Status: " + q.status, 20, 70);
doc.text("Created: " +
new Date(q.created_at).toLocaleString(), 20, 80);

doc.line(10, 95, 200, 95);

doc.setFont(undefined, "bold");
doc.text("Description:", 20, 110);

doc.setFont(undefined, "normal");
doc.text(
q.detailed_description || "N/A",
20,
120,
{ maxWidth: 170 }
);

// Signature section
doc.line(20, 240, 80, 240);
doc.text("Authorized Signature", 20, 250);

doc.line(120, 240, 180, 240);
doc.text("Client Signature", 120, 250);

doc.setFontSize(9);
doc.text("TechRescue Confidential Document", 60, 275);

doc.save(q.ticket_number + ".pdf");
}

/* ========================= SEARCH ========================= */
function applySearch(){
const text =
document.getElementById("searchInput").value.toLowerCase();

const rows =
document.querySelectorAll("#queryTable tr");

rows.forEach(row => {
const content = row.innerText.toLowerCase();
row.style.display =
content.includes(text) ? "" : "none";
});
}

loadQueryHistory();

</script>

</body>
</html>
