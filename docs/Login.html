<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - TechRescue</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-md rounded-lg p-8 w-full max-w-md">

<h2 class="text-2xl font-semibold text-center text-blue-600 mb-6">
Login to TechRescue
</h2>

<!-- ROLE TOGGLE -->
<div class="flex justify-center mb-6">
  <button type="button" id="clientTab"
    class="px-6 py-2 rounded-l-lg bg-blue-600 text-white">
    Client
  </button>
  <button type="button" id="expertTab"
    class="px-6 py-2 rounded-r-lg bg-gray-200">
    Expert
  </button>
</div>

<input type="hidden" id="role" value="client">

<form id="loginForm" class="space-y-4">

<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
<input type="email" id="email" required
class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500"/>
</div>

<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
<input type="password" id="password" required
class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500"/>
</div>

<button type="submit"
class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
Log In
</button>

</form>

<p id="msg" class="text-center text-red-600 mt-3"></p>

</div>

<script>

// ROLE SWITCH
const clientTab = document.getElementById("clientTab");
const expertTab = document.getElementById("expertTab");
const roleInput = document.getElementById("role");

clientTab.onclick = () => {
  roleInput.value = "client";
  clientTab.classList.add("bg-blue-600","text-white");
  expertTab.classList.remove("bg-blue-600","text-white");
  expertTab.classList.add("bg-gray-200");
};

expertTab.onclick = () => {
  roleInput.value = "expert";
  expertTab.classList.add("bg-blue-600","text-white");
  clientTab.classList.remove("bg-blue-600","text-white");
  clientTab.classList.add("bg-gray-200");
};

// LOGIN SUBMIT
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  const res = await fetch("https://techrescue.onrender.com/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, role })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("token", data.token);

    if (data.role === "client") {
      window.location.href = "client.html";
    } else if (data.role === "expert") {
      window.location.href = "Expert.html";
    }

  } else {
    document.getElementById("msg").innerText = data.error;
  }
});
</script>

</body>
</html>
