<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - TechRescue</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-lg rounded-xl w-full max-w-lg p-8">

<h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
Create Your Account
</h2>

<!-- ROLE TOGGLE -->
<div class="flex justify-center mb-6">
    <button type="button" id="clientTab"
        class="px-6 py-2 rounded-l-lg bg-blue-600 text-white">
        Client
    </button>
    <button type="button" id="expertTab"
        class="px-6 py-2 rounded-r-lg bg-gray-200">
        Expert
    </button>
</div>

<input type="hidden" id="role" value="client">

<form id="signupForm" class="space-y-4">

<div class="grid grid-cols-2 gap-4">
<input type="text" id="firstName" placeholder="First Name" class="w-full border rounded-lg p-2" required>
<input type="text" id="lastName" placeholder="Last Name" class="w-full border rounded-lg p-2" required>
</div>

<input type="email" id="email" placeholder="Email ID" class="w-full border rounded-lg p-2" required>
<input type="password" id="password" placeholder="Password" class="w-full border rounded-lg p-2" required>

<!-- EXPERT ONLY FIELDS -->
<div id="expertFields" class="space-y-4 hidden">
<select id="country" class="w-full border rounded-lg p-2">
<option value="">Select Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
<option>Australia</option>
</select>

<select id="state" class="w-full border rounded-lg p-2">
<option value="">Select State</option>
<option>Uttar Pradesh</option>
<option>Delhi</option>
<option>Haryana</option>
<option>Maharashtra</option>
</select>
</div>

<button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
Create Account
</button>

</form>

<p id="message" class="text-center mt-4 font-semibold"></p>

</div>

<script>

// ROLE SWITCH LOGIC
const clientTab = document.getElementById("clientTab");
const expertTab = document.getElementById("expertTab");
const roleInput = document.getElementById("role");
const expertFields = document.getElementById("expertFields");

clientTab.onclick = () => {
    roleInput.value = "client";
    clientTab.classList.add("bg-blue-600","text-white");
    expertTab.classList.remove("bg-blue-600","text-white");
    expertTab.classList.add("bg-gray-200");
    expertFields.classList.add("hidden");
};

expertTab.onclick = () => {
    roleInput.value = "expert";
    expertTab.classList.add("bg-blue-600","text-white");
    clientTab.classList.remove("bg-blue-600","text-white");
    clientTab.classList.add("bg-gray-200");
    expertFields.classList.remove("hidden");
};

// SIGNUP SUBMIT
document.getElementById("signupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const messageBox = document.getElementById("message");
    const role = roleInput.value;

    const data = {
        first_name: document.getElementById("firstName").value,
        last_name: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        country: role === "expert" ? document.getElementById("country").value : null,
        state: role === "expert" ? document.getElementById("state").value : null,
        role: role
    };

    try {
        const res = await fetch("https://techrescue.onrender.com/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {

            messageBox.innerHTML =
                '<span class="text-green-600">🎉 Account created successfully!</span>';

            setTimeout(() => {
                window.location.href = "Login.html";
            }, 1000);

        } else {
            messageBox.innerHTML =
                '<span class="text-red-600">' + result.error + '</span>';
        }

    } catch (err) {
        messageBox.innerHTML =
            '<span class="text-red-600">❌ Server error</span>';
    }
});

</script>

</body>
</html>
