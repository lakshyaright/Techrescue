<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expert Dashboard - TechRescue</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
body{margin:0;font-family:'Inter',Arial,sans-serif;background:#f4f6f8;color:#333;display:flex;height:100vh;}
.sidebar{width:240px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;padding:20px;}
.sidebar h2{font-size:18px;margin-bottom:30px;color:#0066cc;}
.sidebar nav ul{list-style:none;padding:0;margin:0;flex:1;}
.sidebar nav li{margin-bottom:20px;}
.sidebar nav a{text-decoration:none;color:#333;font-weight:500;}
.sidebar nav a.active{color:#0066cc;}
.main{flex:1;display:flex;flex-direction:column;}
.topbar{background:#0066cc;color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;}
.content{padding:20px;overflow-y:auto;}
.alerts .alert{background:#fff3cd;border:1px solid #ffeeba;padding:10px;border-radius:4px;margin-bottom:10px;}
.alerts .actions button{padding:5px 10px;margin-right:5px;border:none;border-radius:4px;cursor:pointer;font-size:12px;}
.respond{background:#0066cc;color:white;}
</style>
</head>

<body>

<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "Login.html";
} else {
  const decoded = JSON.parse(atob(token.split(".")[1]));
  if (decoded.role !== "expert") {
    window.location.href = "Login.html";
  }
}
</script>

<div class="sidebar">
  <h2>TechRescue</h2>
  <nav>
    <ul>
      <li><a href="Expert.html" class="active">Dashboard</a></li>
      <li><a href="alerts.html">Alerts</a></li>
      <li><a href="jobs.html">Jobs</a></li>
      <li><a href="messages.html">Messages</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>
</div>

<div class="main">

<div class="topbar">
  <div>Expert Dashboard</div>
  <div id="userName"></div>
</div>

<div class="content">
  <div class="alerts">
    <h3>New Alerts</h3>
    <div id="alertsContainer">
      <p>Loading alerts...</p>
    </div>
  </div>
</div>

</div>

<script>

/* Load User */
async function loadUser(){
  const res = await fetch("https://techrescue.onrender.com/me",{
    headers:{ "Authorization":"Bearer "+token }
  });

  const user = await res.json();
  document.getElementById("userName").innerText = user.first_name + " " + user.last_name;
}

loadUser();

/* Load Alerts */
async function loadAlerts(){
  const res = await fetch("https://techrescue.onrender.com/expert-alerts",{
    headers:{ "Authorization":"Bearer "+token }
  });

  const alerts = await res.json();
  const container = document.getElementById("alertsContainer");

  if(!alerts || alerts.length===0){
    container.innerHTML="<p>No new alerts</p>";
    return;
  }

  container.innerHTML="";

  alerts.forEach(alert=>{
    container.innerHTML+=`
      <div class="alert">
        <h4>${alert.ticket_number}</h4>
        <p>
          <strong>${alert.short_description}</strong><br>
          ${alert.detailed_description || ""}<br>
          Priority: ${alert.priority}
        </p>
        <div class="actions">
          <button class="respond" onclick="respondToAlert('${alert.ticket_number}')">
            Respond
          </button>
        </div>
      </div>
    `;
  });
}

/* Respond */
async function respondToAlert(ticketNumber){

  const res = await fetch("https://techrescue.onrender.com/accept-ticket",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      ticket_number:ticketNumber
    })
  });

  const data = await res.json();
  console.log("Accept Response:",data);

  loadAlerts();
}

/* Auto Refresh */
setInterval(loadAlerts,5000);
loadAlerts();

function logout(){
  localStorage.removeItem("token");
  window.location.href="Login.html";
}

</script>

</body>
</html>
